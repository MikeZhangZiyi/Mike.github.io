<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
          delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
          ],
          throwOnError : false
        });">
</script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Zilla+Slab:ital@1&display=swap" rel="stylesheet">
<style>
    /* 1. 针对所有页面主体内容的强制动画 */
    #top, .main, .post-single, .list-header {
        animation: smooth-entry 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
        opacity: 0;
        will-change: transform, opacity;
    }

    /* 2. 定义从下方位移并淡入的动作 */
    @keyframes smooth-entry {
        0% {
            opacity: 0;
            transform: translateY(15px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 3. 优化：点击菜单时的即时反馈（解决“直接跳转”的生硬感） */
    .menu a:active {
        transform: scale(0.96);
        transition: 0.1s;
    }
</style>

<script>
    // 在页面卸载前（点击链接跳转时）给主体加一个淡出效果
    window.addEventListener('beforeunload', function() {
        const main = document.querySelector('.main') || document.querySelector('#top');
        if (main) {
            main.style.transition = 'opacity 0.2s ease';
            main.style.opacity = '0';
        }
    });
</script>
