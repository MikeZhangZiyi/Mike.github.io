<script>
    document.addEventListener("DOMContentLoaded", function() {
        const text = "Recording life, technology and essays"; // 你的 subtitle 内容
        const speed = 100; // 打字速度 (ms)
        const target = document.querySelector(".header-description") || document.querySelector(".description");
        
        if (target) {
            target.innerHTML = '<span class="typing-text"></span><span class="typing-cursor"></span>';
            const textContainer = target.querySelector(".typing-text");
            let i = 0;

            function typeWriter() {
                if (i < text.length) {
                    textContainer.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            typeWriter();
        }
    });
</script>
