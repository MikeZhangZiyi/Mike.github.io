<script>
    (function() {
        const profile = document.getElementById("dynamic-profile");
        if (!profile) return;

        
        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("cal-header").innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById("cal-grid");
            grid.innerHTML = "";

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += '<span></span>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = d === today ? 'background: #14b30f; color: white; border-radius: 4px; font-weight: bold;' : '';
                grid.innerHTML += `<span style="padding: 2px 0; ${isToday}">${d}</span>`;
            }
        }

        
        function updatePosition() {
            const mainContent = document.querySelector(".main");
            if (!mainContent || window.innerWidth < 1350) {
                profile.style.visibility = "hidden";
                return;
            }
            const rect = mainContent.getBoundingClientRect();
            profile.style.left = (rect.left - 240) + "px"; 
            profile.style.top = "150px";
            profile.style.width = "200px";
            profile.style.visibility = "visible";
        }

        document.body.appendChild(profile);
        renderCalendar();
        updatePosition();
        window.addEventListener("resize", updatePosition);
    })();
</script><script>
    document.addEventListener("DOMContentLoaded", function() {
        const text = "Recording life, technology and essays"; 
        const target = document.querySelector(".header-description") || document.querySelector(".description");
        
        if (target) {
            target.innerHTML = '<span class="typing-text"></span><span class="typing-cursor"></span>';
            const textContainer = target.querySelector(".typing-text");
            let i = 0;
            const speed = 100;

            function typeWriter() {
                if (i < text.length) {
                    textContainer.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            typeWriter();
        }
    });
</script>
